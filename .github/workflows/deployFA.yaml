name: Full Deployment

on:
  push:
    branches:
      - dev

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch fastapi Variables and Create .env
        run: |
          echo "Fetching fastapi environment variables..."
          echo "${{ vars.fastapi_env }}" > fastapi.env
          echo "This is the content of the fastapi.env file:"
          cat fastapi.env

      - name: SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: "."
          target: "Internship-2025/Resume-Screening-App/FastApi"

      - name: SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd Internship-2025/Resume-Screening-App/FastApi
            docker compose build
            docker compose up -d --force-recreate
            docker system prune -af